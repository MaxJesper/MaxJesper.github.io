<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bildstöd – Periodiska systemet</title>
  <link rel="stylesheet" href="/periodiska-systemet/style.css" />
  <style>
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin: 1rem 0 1.5rem;
    }

    .toolbar label {
      font-weight: 600;
    }

    .toolbar select {
      padding: 0.5rem 0.75rem;
      font: inherit;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .bildgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .bildkort {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }

    .bildkort img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin: 0 auto 0.75rem;
      display: block;
    }

    .svenska {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .andra-spraket {
      color: #444;
      font-size: 0.95rem;
      min-height: 1.2em;
    }

    .saknas {
      opacity: 0.7;
      font-style: italic;
    }
  </style>
</head>
<body>
  <main class="container">
    <p><a href="/periodiska-systemet/index.html">← Tillbaka</a></p>
    <h1>Bildstöd</h1>
    <p>Här visas svenska ord tillsammans med valt språk.</p>

    <div class="toolbar">
      <label for="sprakVal">Välj språk:</label>
      <select id="sprakVal">
        <option value="en">Engelska</option>
        <option value="ar">Arabiska</option>
        <option value="fa">Persiska</option>
        <option value="prs">Dari</option>
        <option value="so">Somaliska</option>
        <option value="uk">Ukrainska</option>
      </select>
    </div>

    <section id="bildgrid" class="bildgrid"></section>
  </main>

  <script src="/periodiska-systemet/js/bildstod.js"></script>
</body>
</html>
