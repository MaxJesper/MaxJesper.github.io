<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bildstöd – Periodiska systemet</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    :root {
      --kortbredd: 4cm;
      --bildstorlek: 3.25cm;
      --textfarg: #222;
      --dovtext: #666;
      --kortbakgrund: #ffffff;
      --bildbakgrund: #f5f5f3;
      --kant: #e6e6e2;
    }
  
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: var(--textfarg);
    }
  
    .sida {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem;
    }
  
    .tillbaka-lank {
      margin: 0 0 1rem;
    }
  
    .sidhuvud {
      margin-bottom: 1rem;
    }
  
    .sidhuvud h1 {
      margin-bottom: 0.35rem;
    }
  
    .sidhuvud p {
      margin-top: 0;
      color: var(--dovtext);
    }
  
    .verktygsrad {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: end;
      margin: 1rem 0 1.5rem;
      padding: 1rem;
      border: 1px solid var(--kant);
      border-radius: 14px;
      background: #fafaf8;
    }
  
    .faltgrupp {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 220px;
    }
  
    .faltgrupp label {
      font-weight: 600;
    }
  
    .faltgrupp input {
      font: inherit;
      padding: 0.65rem 0.8rem;
      border: 1px solid #c8c8c3;
      border-radius: 10px;
      background: white;
    }
  
    .knappar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
  
    .knapp {
      font: inherit;
      padding: 0.7rem 1rem;
      border: 1px solid #c8c8c3;
      border-radius: 10px;
      background: white;
      cursor: pointer;
    }
  
    .knapp:hover {
      background: #f3f3ef;
    }
  
    .statusrad {
      min-height: 1.5rem;
      margin-bottom: 1rem;
      color: var(--dovtext);
    }
  
    .bildgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--kortbredd), 1fr));
      gap: 0.55cm 0.45cm;
      align-items: start;
      justify-items: start;
    }
  
    .bildkort {
      width: var(--kortbredd);
      min-height: 5.45cm;
      padding: 0.08cm;
      border: none;
      border-radius: 0;
      background: var(--kortbakgrund);
      box-sizing: border-box;
      text-align: center;
      page-break-inside: avoid;
      break-inside: avoid;
    }
  
    .bildruta {
      width: var(--bildstorlek);
      height: var(--bildstorlek);
      margin: 0 auto 0.18cm;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bildbakgrund);
      border: 1px solid var(--kant);
      border-radius: 14px;
      overflow: hidden;
    }
  
    .bildruta img {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
      display: block;
    }
  
    .ord-svenska {
      font-weight: 700;
      color: var(--textfarg);
      line-height: 1.22;
      margin-top: 0.05cm;
      word-break: break-word;
      font-size: 0.97rem;
    }
  
    .ord-oversattning {
      margin-top: 0.1cm;
      color: #444;
      line-height: 1.2;
      min-height: 1.2em;
      word-break: break-word;
      font-size: 0.9rem;
    }
  
    .utan-oversattning .ord-oversattning {
      display: none;
    }
  
    .tomt-resultat,
    .felruta {
      padding: 1rem;
      border: 1px solid var(--kant);
      border-radius: 12px;
      background: #fafaf8;
    }
  
    .felruta {
      border-color: #d9b5b5;
      background: #fff7f7;
      color: #8a2d2d;
    }
  
    @media (max-width: 700px) {
      .verktygsrad {
        align-items: stretch;
      }
  
      .knappar {
        width: 100%;
      }
    }
  
    @media print {
      @page {
        size: A4 portrait;
        margin: 10mm;
      }
  
      body {
        background: white;
      }
  
      .tillbaka-lank,
      .verktygsrad,
      .statusrad {
        display: none !important;
      }
  
      .sida {
        max-width: none;
        margin: 0;
        padding: 0;
      }
  
      .sidhuvud {
        margin-bottom: 0.35cm;
      }
  
      .sidhuvud h1 {
        font-size: 16pt;
        margin: 0 0 0.12cm;
      }
  
      .sidhuvud p {
        font-size: 10pt;
        margin: 0 0 0.15cm;
        color: #444;
      }
  
      .bildgrid {
        grid-template-columns: repeat(4, 4cm);
        gap: 0.35cm 0.35cm;
        justify-content: start;
      }
  
      .bildkort {
        width: 4cm;
        min-height: 5.35cm;
        padding: 0.05cm;
      }
  
      .bildruta {
        width: 3.3cm;
        height: 3.3cm;
        border-radius: 12px;
      }
  
      .ord-svenska {
        font-size: 10.5pt;
      }
  
      .ord-oversattning {
        font-size: 9.5pt;
      }
    }
</style>
</head>
<body>
  <main class="sida">
    <p class="tillbaka-lank"><a href="./index.html">← Tillbaka</a></p>

    <header class="sidhuvud">
      <h1>Bildstöd</h1>
      <p>
        Skriv in en språkkod, till exempel <strong>en</strong>, <strong>ar</strong>, <strong>fa</strong>,
        <strong>prs</strong>, <strong>so</strong> eller <strong>uk</strong>.
        Om rutan lämnas tom visas bara svenska.
      </p>
    </header>

    <section class="verktygsrad" aria-label="Inställningar för bildstöd">
      <div class="faltgrupp">
        <label for="sprakkod">Språkkod</label>
        <input
          id="sprakkod"
          type="text"
          inputmode="latin"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
          placeholder="t.ex. en"
        />
      </div>

      <div class="knappar">
        <button id="uppdatera-knapp" class="knapp" type="button">Visa språk</button>
        <button id="rensa-knapp" class="knapp" type="button">Visa bara svenska</button>
        <button id="skriv-ut-knapp" class="knapp" type="button">Skriv ut</button>
      </div>
    </section>

    <div id="statusrad" class="statusrad" aria-live="polite"></div>

    <section id="bildgrid" class="bildgrid" aria-label="Bildstödskort"></section>
  </main>

  <script src="./js/bildstod.js"></script>
</body>
</html>
