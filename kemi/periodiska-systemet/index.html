<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodiska systemet – Kemi</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="kemi-header">
  <h1>Periodiska systemet</h1>
  <p>Jesper Tordsson</p>
</header>

<button class="hamburger" onclick="toggleMenu()">☰</button>
<nav id="side-menu"></nav>

<main>
  <p>Välj material:</p>

  <ul>
    <li><a href="./checklista.html">Checklista</a></li>
    <li><a href="./instuderingsfragor.html">Instuderingsfrågor</a></li>
    <li><a href="./ovningsprov.html">Övningsprov</a></li>
    <li><a href="./korsord.html">Korsord periodiska systemet</a></li>
    <li><a href="./memory.html">Memoryspel periodiska systemet</a></li>
  </ul>

  <hr>

  <p>Träna med AI:</p>
  <p>
    <button id="ai-train-btn" class="subject-btn" type="button">🤖 Träna med AI</button>
    <button id="ai-reset-btn" class="subject-btn" type="button">🔄 Reset</button>
  </p>

  <p id="ai-status"></p>

  <div id="ai-chat" style="margin-top:10px;">
    <div id="ai-output" style="white-space:pre-wrap; border:1px solid #ccc; padding:8px; min-height:80px;"></div>

    <textarea id="ai-input" placeholder="Skriv ditt svar..." style="width:70%; margin-top:6px; height:90px;"></textarea>
    <button id="ai-send" type="button">Skicka</button>
  </div>

  <p style="margin-top:12px;">
    <a href="../kemi/index.html" class="subject-btn">← Tillbaka till Kemi</a>
  </p>
</main>

<script src="/js/menu.js"></script>

<script>
  const workerUrl = "https://no-lararen-final.jesper-tordsson.workers.dev";
  const pageTitle = document.title;
  const AI_SUBJECT = "Kemi";
  const AI_AREA = "Periodiska systemet";
  
  const AI_TRAINING_PROMPT = `
  DU ÄR: En tålmodig, effektiv NO-lärare i svensk skola. Eleven går i åk 9 och tränar inför prov på PERIODISKA SYSTEMET, ATOMENS BYGGNAD, JONER och KEMISK BINDNING.
  
  HUVUDUPPGIFT:
  Träna aktivt i dialog. Du ska själv driva träningen framåt och "beta av" målen. Eleven ska aldrig behöva be dig fortsätta.
  
  STIL (MYCKET VIKTIGT):
  - Svara på svenska.
  - Var KORT. Max 1–2 korta meningar återkoppling, sedan direkt en ny fråga.
  - Ingen onödig småprat/utfyllnad.
  - Ge inte facit direkt. Använd ledtråd + följdfråga.
  - Om svaret är rätt: skriv t.ex. "Bra." / "Stämmer." och gå vidare.
  - Om delvis rätt: skriv "Delvis rätt – förtydliga ..." och ställ en precis följdfråga.
  - Om fel: skriv kort vad som missförståtts (1 mening), ge ledtråd och ny chans.
  
  FORMAT (ALLTID):
  1) Kort återkoppling (eller ledtråd)
  2) Nästa fråga (sluta alltid med en fråga)
  3) Om eleven skriver “fortsätt/ok/ja”: ställ nästa fråga direkt.
  
  INRE PLAN (visa inte för eleven):
  Håll koll på delområden och markera dem som "avklarade" när eleven klarar 2–3 frågor i rad på området:
  A) Atomens byggnad: proton/neutron/elektron, laddning, plats, atomnummer, varför atomer är neutrala
  B) Elektronskal & valenselektroner (första 20): K=2 L=8 M=8, valenselektroner, period/grupp
  C) Periodiska systemet: period vs grupp, metaller/icke-metaller, varför reaktivitet skiljer sig
  D) Familjer: alkalimetaller (gr 1), halogener (gr 17), ädelgaser (gr 18): egenskaper + exempel på användning
  E) Joner: hur + och – joner bildas, varför vissa lämnar/tar upp elektroner
  F) Bindningar: jonbindning, molekylbindning, metallbindning (enkel nivå)
  G) Saltvatten leder ström: koppla till joner
  
  NÄR ETT OMRÅDE ÄR AVKLARAT:
  Skriv kort beröm (1 mening) och fråga:
  "Vill du gå vidare till nästa område eller träna mer på detta?"
  Om eleven väljer nästa: föreslå 2 alternativ och låt eleven välja.
  
  STARTA SÅ HÄR (exakt):
  Fråga 1: "Välj nivå: 1 (lätt), 2 (medel), 3 (prov)."
  Fråga 2: "Välj fokus: atomen, periodiska systemet, familjerna, joner/bindningar eller blandat?"
  Fråga 3: börja direkt med första faktiska frågan.
  
  INNEHÅLL SOM SKA ÖVAS (blanda över tid):
  - proton, neutron, elektron (laddning och plats i atomen)
  - varför atomer är oladdade
  - atomnummer (koppling till protoner)
  - elektronskal (K=2, L=8, M=8 för de första 20) och valenselektroner
  - period vs grupp (skal vs valenselektroner)
  - metaller och icke-metaller (tendens att lämna/tar upp elektroner)
  - alkalimetaller (gr 1), halogener (gr 17), ädelgaser (gr 18) + egenskaper och exempel på användning
  - hur joner bildas (+ och −)
  - jonbindning, molekylbindning, metallbindning (enkel nivå)
  - varför saltvatten leder ström
  
  MINISCENARIER (ibland, kort):
  Natrium + klor, salt i vatten, helium i ballong.
  `.trim();

  const statusEl = document.getElementById("ai-status");
  const outputEl = document.getElementById("ai-output");
  const inputEl  = document.getElementById("ai-input");
  const sendBtn  = document.getElementById("ai-send");
  const startBtn = document.getElementById("ai-train-btn");
  const resetBtn = document.getElementById("ai-reset-btn");

  // Enkel kontext som skickas till AI varje gång
  let conversation = "";
  let started = false;
  let busy = false;

  function setBusy(on, msg) {
    busy = on;
    startBtn.disabled = on;
    sendBtn.disabled = on;
    inputEl.disabled = on;
    resetBtn.disabled = on;
    if (msg !== undefined) statusEl.textContent = msg;
  }

  function appendLine(text) {
    outputEl.textContent += (outputEl.textContent ? "\n\n" : "") + text;
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function getAccessKey() {
    let k = sessionStorage.getItem("APP_ACCESS_KEY");
    if (!k) {
      k = prompt("Skriv klasskoden för AI:");
      if (k) sessionStorage.setItem("APP_ACCESS_KEY", k);
    }
    return k || "";
  }

  function resetAll() {
    conversation = "";
    started = false;
    outputEl.textContent = "";
    statusEl.textContent = "";
    inputEl.value = "";
    // Tar bort klasskoden så du kan byta i workern och tvinga ny kod
    sessionStorage.removeItem("APP_ACCESS_KEY");
    inputEl.focus();
  }

  async function callAI(promptText) {
    const accessKey = getAccessKey();
    if (!accessKey) {
      throw new Error("Ingen klasskod angiven.");
    }

    const r = await fetch(workerUrl, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          accessKey: accessKey,
          area: pageTitle,
          prompt: promptText
        })
    });

    const d = await r.json();

    // Om fel kod: nollställ sparad kod så den frågar igen nästa gång
    if (d?.error === "Unauthorized" || r.status === 403) {
      sessionStorage.removeItem("APP_ACCESS_KEY");
      throw new Error("Fel klasskod. Försök igen.");
    }

  if (!r.ok || !d.ok) {
    console.error("AI-fel (hela objektet):", d);
  
    const googleMsg =
      d?.details?.error?.message ||
      d?.details?.error ||
      d?.details?.message ||
      "";
  
    const msg = (d?.error || ("HTTP " + r.status)) + (googleMsg ? (": " + googleMsg) : "");
    throw new Error(msg);
  }

    return d.text;
  }

  async function startTraining() {
    if (busy) return;
    setBusy(true, "🤖 AI tänker...");
    outputEl.textContent = "";
    inputEl.value = "";
    inputEl.focus();

    try {
      const aiText = await callAI(AI_TRAINING_PROMPT);
      conversation = "AI: " + aiText;
      started = true;

      setBusy(false, "✅ Träning startad");
      appendLine("AI: " + aiText);

    } catch (err) {
      setBusy(false, "⚠️ " + err.message);
    }
  }

  async function sendStudentAnswer() {
    if (busy) return;

    const studentText = (inputEl.value || "").trim();
    if (!studentText) return;

    if (!started) {
      statusEl.textContent = "ℹ️ Klicka först på “🤖 Träna med AI”.";
      return;
    }

    inputEl.value = "";
    inputEl.focus();

    appendLine("Elev: " + studentText);
    setBusy(true, "🤖 AI tänker...");

    try {
      const promptText = conversation + "\n\nElev: " + studentText + "\nAI:";
      const aiText = await callAI(promptText);

      conversation += "\n\nElev: " + studentText + "\nAI: " + aiText;

      setBusy(false, "✅");
      appendLine("AI: " + aiText);

    } catch (err) {
      setBusy(false, "⚠️ " + err.message);
    }
  }

  startBtn.addEventListener("click", startTraining);
  sendBtn.addEventListener("click", sendStudentAnswer);
  resetBtn.addEventListener("click", () => {
    if (busy) return;
    resetAll();
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendStudentAnswer();
  });
</script>

</body>
</html>
