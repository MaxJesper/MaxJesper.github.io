<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodiska systemet – Kemi</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="kemi-header">
  <h1>Periodiska systemet</h1>
  <p>Jesper Tordsson</p>
</header>

<button class="hamburger" onclick="toggleMenu()">☰</button>
<nav id="side-menu"></nav>

<main>
  <p>Välj material:</p>

  <ul>
    <li><a href="./checklista.html">Checklista</a></li>
    <li><a href="./instuderingsfragor.html">Instuderingsfrågor</a></li>
    <li><a href="./ovningsprov.html">Övningsprov</a></li>
    <li><a href="./korsord.html">Korsord periodiska systemet</a></li>
    <li><a href="./memory.html">Memoryspel periodiska systemet</a></li>
  </ul>

  <hr>

  <p>Träna med AI:</p>
  <p>
    <button id="ai-train-btn" class="subject-btn" type="button">🤖 Träna med AI</button>
    <button id="ai-reset-btn" class="subject-btn" type="button">🔄 Reset</button>
  </p>

  <p id="ai-status"></p>

  <div id="ai-chat" style="margin-top:10px;">
    <div id="ai-output" style="white-space:pre-wrap; border:1px solid #ccc; padding:8px; min-height:90px;"></div>

    <textarea id="ai-input" placeholder="Skriv ditt svar..." style="width:70%; margin-top:6px; height:110px;"></textarea>
    <button id="ai-send" type="button">Skicka</button>

    <p style="margin:6px 0 0 0; font-size:0.9em; opacity:0.8;">
      Tips: <b>Ctrl+Enter</b> (Windows/Chromebook) eller <b>Cmd+Enter</b> (Mac) för att skicka.
    </p>
  </div>

  <p style="margin-top:12px;">
    <a href="../kemi/index.html" class="subject-btn">← Tillbaka till Kemi</a>
  </p>
</main>

<script src="/js/menu.js"></script>

<script>
  // ==== INSTÄLLNINGAR ====
  const workerUrl = "https://no-lararen-final.jesper-tordsson.workers.dev";
  const CHECKLIST_URLS = [
    "./data/checklista.json",            // vanligast i dina områden
    "./checklista.json",                 // om du råkat lägga den i roten för området
    "../data/checklista.json",           // om HTML ligger i en undermapp
  ];
  
  const MAX_CONTEXT_CHARS = 4000;                   // håller nere promptstorlek (minskar kvot/latens)

  // ==== ÄMNE + OMRÅDE AUTOMATISKT FRÅN <title> ====
  const pageTitle = document.title;                 // "Periodiska systemet – Kemi"
  const parts = pageTitle.split("–");
  const AI_AREA = parts[0].trim();                  // "Periodiska systemet"
  const AI_SUBJECT = parts[1]?.trim() || "NO";      // "Kemi"

  // ==== KONSTANT GRUNDPROMPT (SAMMA PÅ ALLA SIDOR) ====
  const BASE_PROMPT = `
DU ÄR: En effektiv NO-lärare i svensk skola.

HUVUDUPPGIFT:
Träna aktivt i dialog. Du ska själv driva träningen framåt. Eleven ska aldrig behöva be dig fortsätta.

STIL (MYCKET VIKTIGT):
- Svara på svenska.
- Inget småprat/utfyllnad.
- Max 1–2 korta meningar återkoppling, sedan direkt nästa fråga.
- Avsluta alltid med en fråga.
- Om eleven skriver "fortsätt", "ok", "ja", "kör": hoppa direkt till nästa fråga.
- Ge inte facit direkt. Använd ledtråd + följdfråga.
- När ett delområde verkar avklarat: kort beröm + fråga om eleven vill gå vidare eller träna mer.

STARTA SÅ HÄR (exakt):
1) "Välj nivå: 1 (lätt), 2 (medel), 3 (prov)."
2) "Välj fokus: (a) begrepp, (b) resonemang, (c) blandat."
3) Börja direkt med första frågan.
`.trim();

  // ==== UI ====
  const statusEl = document.getElementById("ai-status");
  const outputEl = document.getElementById("ai-output");
  const inputEl  = document.getElementById("ai-input");
  const sendBtn  = document.getElementById("ai-send");
  const startBtn = document.getElementById("ai-train-btn");
  const resetBtn = document.getElementById("ai-reset-btn");

  // ==== STATE ====
  let conversation = "";
  let started = false;
  let busy = false;
  let checklistGoalText = "";   // byggs från checklista.json

  function setBusy(on, msg) {
    busy = on;
    startBtn.disabled = on;
    sendBtn.disabled = on;
    inputEl.disabled = on;
    resetBtn.disabled = on;
    if (msg !== undefined) statusEl.textContent = msg;
  }

  function appendLine(text) {
    outputEl.textContent += (outputEl.textContent ? "\n\n" : "") + text;
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function getAccessKey() {
    let k = sessionStorage.getItem("APP_ACCESS_KEY");
    if (!k) {
      k = prompt("Skriv klasskoden för AI:");
      if (k) sessionStorage.setItem("APP_ACCESS_KEY", k);
    }
    return k || "";
  }

  function resetAll() {
    conversation = "";
    started = false;
    outputEl.textContent = "";
    statusEl.textContent = "";
    inputEl.value = "";
    sessionStorage.removeItem("APP_ACCESS_KEY");
    inputEl.focus();
  }

  // ==== CHECKLISTA -> MÅLTEXT ====
  function extractChecklistTexts(json) {
    const out = [];

    const pushIfText = (v) => {
      if (!v) return;
      if (typeof v === "string") {
        const s = v.trim();
        if (s) out.push(s);
      }
    };

    const walk = (node) => {
      if (!node) return;

      if (Array.isArray(node)) {
        node.forEach(walk);
        return;
      }

      if (typeof node === "string") {
        pushIfText(node);
        return;
      }

      if (typeof node === "object") {
        // Vanliga fält i checklistor
        pushIfText(node.text);
        pushIfText(node.title);
        pushIfText(node.label);
        pushIfText(node.question);

        // Vanliga strukturer: items, sections, groups, checklist, data
        walk(node.items);
        walk(node.sections);
        walk(node.groups);
        walk(node.checklist);
        walk(node.data);

        // Ibland finns "children"
        walk(node.children);
      }
    };

    walk(json);

    // unik + begränsa längd
    const uniq = [...new Set(out)].slice(0, 60); // max 60 punkter
    return uniq;
  }

  async function loadChecklistGoals() {
    for (const url of CHECKLIST_URLS) {
      try {
        const r = await fetch(url, { cache: "no-store" });
        if (!r.ok) continue;
  
        const data = await r.json();
        const items = extractChecklistTexts(data);
        if (!items.length) continue;
  
        // Gör en kort mållista (AI behöver inte romaner)
        return items.slice(0, 60).map((s) => "- " + s).join("\n");
      } catch {
        // prova nästa url
      }
    }
    return "(kunde inte hitta/öppna checklista.json)";
  }

  // ==== GEMINI CALL VIA WORKER ====
  async function callAI(promptText) {
    const accessKey = getAccessKey();
    if (!accessKey) throw new Error("Ingen klasskod angiven.");

    const r = await fetch(workerUrl, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        accessKey: accessKey,
        subject: AI_SUBJECT,
        area: AI_AREA,
        // Du kan (valfritt) styra modell/parametrar från sidan:
        // model: "gemini-2.5-flash",
        // temperature: 0.2,
        // maxOutputTokens: 600,
        prompt: promptText
      })
    });

    const d = await r.json();

    if (d?.error === "Unauthorized" || r.status === 403) {
      sessionStorage.removeItem("APP_ACCESS_KEY");
      throw new Error("Fel klasskod. Försök igen.");
    }

    if (!r.ok || !d.ok) {
      const googleMsg =
        d?.details?.error?.message ||
        d?.details?.error ||
        d?.details?.message ||
        "";
      throw new Error((d?.error || ("HTTP " + r.status)) + (googleMsg ? (": " + googleMsg) : ""));
    }

    return d.text;
  }

  function clampContext(s) {
    if (!s) return "";
    if (s.length <= MAX_CONTEXT_CHARS) return s;
  
    // Behåll början (där målen står) + slutet (senaste dialogen)
    const head = s.slice(0, 1200);
    const tail = s.slice(s.length - (MAX_CONTEXT_CHARS - 1200));
    return head + "\n...\n" + tail;
  }

  function buildTrainingPrompt() {
    // Ämne/område + mål från checklista
    const goalsBlock =
      `ÄMNE: ${AI_SUBJECT}\nOMRÅDE: ${AI_AREA}\n\n` +
      `MÅL/INNEHÅLL ATT BETA AV (blanda och bocka av internt):\n` +
      `${checklistGoalText}\n\n` +
      `VIKTIGT: Håll svaren korta. Driv träningen framåt.`;

    return BASE_PROMPT + "\n\n" + goalsBlock;
  }

  async function startTraining() {
    if (busy) return;

    setBusy(true, "Läser in mål från checklista...");
    outputEl.textContent = "";
    inputEl.value = "";
    inputEl.focus();

    // Ladda checklistan (en gång per start/reset)
    checklistGoalText = await loadChecklistGoals();
      if (!checklistGoalText.includes("kunde inte")) {
        statusEl.textContent = "✔ Mål laddade från checklista";
      }
    const trainingPrompt = buildTrainingPrompt();

    setBusy(true, "🤖 AI tänker...");

    try {
      const aiText = await callAI(trainingPrompt);
      conversation =
        `ÄMNE: ${AI_SUBJECT}\nOMRÅDE: ${AI_AREA}\n` +
        `MÅL (internt):\n${checklistGoalText}\n\n` +
        "AI: " + aiText;
      started = true;

      setBusy(false, "✅ Träning startad");
      appendLine("AI: " + aiText);
    } catch (err) {
      setBusy(false, "⚠️ " + err.message);
    }
  }

  async function sendStudentAnswer() {
    if (busy) return;

    const studentText = (inputEl.value || "").trim();
    if (!studentText) return;

    if (!started) {
      statusEl.textContent = "ℹ️ Klicka först på “🤖 Träna med AI”.";
      return;
    }

    inputEl.value = "";
    inputEl.focus();

    appendLine("Elev: " + studentText);
    setBusy(true, "🤖 AI tänker...");

    try {
      // Skicka senaste kontext + nytt svar. Lägg in måltexten kort i början (så AI håller tråden).
      const goalsHint =
        `ÄMNE: ${AI_SUBJECT}. OMRÅDE: ${AI_AREA}.\n` +
        `Träna mot målen (internt):\n${checklistGoalText}\n\n`;
      const promptText =
        clampContext(conversation) +
        "\n\nElev: " + studentText +
        "\nAI:";

      const aiText = await callAI(promptText);

      conversation = clampContext(conversation + "\n\nElev: " + studentText + "\nAI: " + aiText);

      setBusy(false, "✅");
      appendLine("AI: " + aiText);
    } catch (err) {
      setBusy(false, "⚠️ " + err.message);
    }
  }

  startBtn.addEventListener("click", startTraining);
  sendBtn.addEventListener("click", sendStudentAnswer);
  resetBtn.addEventListener("click", () => {
    if (busy) return;
    resetAll();
  });

  // Ctrl+Enter (Win) / Cmd+Enter (Mac) skickar, Enter gör ny rad
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      sendStudentAnswer();
    }
  });
</script>

</body>
</html>
