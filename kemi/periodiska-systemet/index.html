<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodiska systemet – Kemi</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="kemi-header">
  <h1>Periodiska systemet</h1>
  <p>Jesper Tordsson</p>
</header>

<button class="hamburger" onclick="toggleMenu()">☰</button>

<nav id="side-menu"></nav>

<main>
  <p>Välj material:</p>

  <ul>
    <li><a href="/periodiska-systemet/checklista.html">Checklista</a></li>
    <li><a href="/periodiska-systemet/instuderingsfragor.html">Instuderingsfrågor</a></li>
    <li><a href="/periodiska-systemet/ovningsprov.html">Övningsprov</a></li>
  </ul>

  <hr>

  <h3>🤖 Träna med AI</h3>
  <button id="ai-train-btn" class="subject-btn">Starta AI-träning</button>
  <p id="ai-status"></p>

  <p>
    <a href="/kemi/index.html" class="subject-btn">← Tillbaka till Kemi</a>
  </p>
</main>

<script src="/js/menu.js"></script>

<script>
const AI_TRAINING_PROMPT = `
Du är en tålmodig och skicklig NO-lärare i svensk skola. Eleven går i årskurs 8 och ska ha prov på PERIODISKA SYSTEMET, ATOMENS BYGGNAD, JONER och KEMISK BINDNING.

MÅL:
Träna aktivt genom frågor. En fråga i taget. Anpassa nivån.

REGLER:
- Ge inte facit direkt
- Hjälp med ledtrådar
- Variera frågor
- Svara kort och tydligt

INNEHÅLL:
- proton, neutron, elektron
- atomnummer
- elektronskal (2,8,8)
- valenselektroner
- period och grupp
- alkalimetaller, halogener, ädelgaser
- joner (+/-)
- bindningar
- varför saltvatten leder ström

START:
Fråga efter nivå och område, börja sedan direkt.
`.trim();

document.getElementById("ai-train-btn").addEventListener("click", async () => {
  const statusEl = document.getElementById("ai-status");

  try {
    await navigator.clipboard.writeText(AI_TRAINING_PROMPT);
    window.open("https://chat.openai.com/", "_blank");
    statusEl.textContent = "✅ Prompt kopierad! Klistra in i ChatGPT.";
  } catch (err) {
    statusEl.textContent = "⚠️ Kunde inte kopiera.";
  }
});
</script>

</body>
</html>
