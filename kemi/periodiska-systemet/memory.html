<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory: Periodiska systemet & Atomen</title>

  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ====== Viktigt: hindra att sidomenyn blockerar klick när den är stängd ====== */
    #side-menu { pointer-events: none; }
    #side-menu.open { pointer-events: auto; }

    /* Hamburger som i dina andra filer */
    .hamburger{
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 1001;
    }

    /* Layout */
    body { margin: 24px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .subtitle { margin: 0 0 18px; color: #333; }

    .layout{
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (min-width: 980px){
      .layout{ grid-template-columns: 260px 1fr; }
    }

    .panel{
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px 14px;
      background: #fff;
    }

    .side-actions{
      display: grid;
      gap: 10px;
    }

    .stats{
      display: grid;
      gap: 6px;
      font-weight: 700;
      color: #111;
    }
    .stats span{
      font-variant-numeric: tabular-nums;
    }

    /* Knappar: matcha “korsord”-känslan */
    .btn{
      border: 1px solid #111;
      background: #111;
      color: #fff;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      user-select: none;
    }
    .btn.secondary{
      background: #fff;
      color: #111;
    }
    .btn:active{ transform: translateY(1px); }

    /* ====== Memorykort ====== */
    .perspective { perspective: 1000px; }

    .flip-card-inner{
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.55s;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .flip-card-inner.flipped{ transform: rotateY(180deg); }

    .flip-card-front, .flip-card-back{
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      padding: 10px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      box-sizing: border-box;
    }

    .flip-card-front{
      background-color: #111;      /* lite “korsord”-stil */
      color: white;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .flip-card-back{
      background-color: white;
      color: #111;
      transform: rotateY(180deg);
      border: 2px solid #111;
      font-size: 0.9rem;
      line-height: 1.2;
      overflow: hidden;
    }

    /* För att “försvinna” snyggt när par är hittat */
    .matched{
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s 0.5s, opacity 0.5s linear;
    }

    /* 6x5 grid */
    #game-grid{
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 980px){
      #game-grid{ grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    @media (max-width: 740px){
      #game-grid{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 520px){
      #game-grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .card-wrap{
      aspect-ratio: 1 / 1;
    }

    .note{
      font-size: 13px;
      color: #333;
      margin-top: 8px;
      line-height: 1.3;
    }

    /* Win overlay */
    #win-message{
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1200;
    }
    #win-message.open{ display: flex; }
    .win-card{
      background: #fff;
      padding: 18px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
      text-align: center;
    }
    .win-card h2{ margin: 0 0 8px; font-size: 22px; }
    .win-card p{ margin: 0 0 14px; }
  </style>
</head>

<body>
  <!-- Hamburger + meny -->
  <button class="hamburger" onclick="toggleMenu()">☰</button>
  <nav id="side-menu"></nav>

  <h1>Memory: Atomen & Periodiska systemet</h1>
  <p class="subtitle">Para ihop begreppet med rätt förklaring!</p>

  <div class="layout">
    <!-- Vänsterspalt: knappar + räknare -->
    <aside class="panel">
      <div class="side-actions">
        <!-- Identisk med korsord.html -->
        <a href="/kemi/periodiska-systemet/" class="subject-btn">← Tillbaka</a>

        <button class="btn" type="button" id="resetBtn">Starta om spel</button>

        <div class="stats" aria-live="polite">
          <div>Försök: <span id="moves">0</span></div>
          <div>Par kvar: <span id="pairs-left">15</span></div>
        </div>

        <div class="note">
          Tips: Först vänd ett begrepp, sedan en förklaring. När allt är matchat får du ett resultat.
        </div>
      </div>
    </aside>

    <!-- Spelyta -->
    <main class="panel">
      <div id="game-grid" aria-label="Memorykort (6x5)"></div>
    </main>
  </div>

  <!-- Vinstmodal -->
  <div id="win-message" role="dialog" aria-modal="true" aria-label="Vinstmeddelande">
    <div class="win-card">
      <h2>🎉 Snyggt jobbat!</h2>
      <p>Du klarade memoryt på <strong><span id="final-moves">0</span></strong> försök.</p>
      <button class="btn" type="button" id="playAgainBtn">Spela igen</button>
    </div>
  </div>

  <!-- Menylogik (samma som korsord) -->
  <script src="/js/menu.js"></script>

  <script>
    // ====== 15 par = 30 kort (6x5) ======
    const vocabulary = [
      { term: "Atom", def: "Den minsta byggstenen för ett grundämne. Består av protoner, neutroner och elektroner." },
      { term: "Proton", def: "Positivt laddad partikel i atomkärnan. Antalet protoner bestämmer atomnumret." },
      { term: "Neutron", def: "Oladdad (neutral) partikel i atomkärnan. Bidrar till atomens massa." },
      { term: "Elektron", def: "Negativt laddad partikel som rör sig i skal runt atomkärnan." },
      { term: "Atomkärna", def: "Atomens mittpunkt som består av protoner och neutroner. Innehåller nästan hela atomens massa." },
      { term: "Elektronskal", def: "De energinivåer runt kärnan där elektronerna finns (t.ex. K, L, M-skal)." },
      { term: "Valenselektroner", def: "Elektronerna i atomens yttersta skal. Bestämmer ämnets kemiska egenskaper." },
      { term: "Isotop", def: "Varianter av ett grundämne med samma antal protoner men olika antal neutroner." },
      { term: "Grundämne", def: "Ett ämne där alla atomer har samma antal protoner." },
      { term: "Atomnummer", def: "Antalet protoner i kärnan. Avgör vilket grundämne det är." },
      { term: "Masstal", def: "Summan av antalet protoner och neutroner i en atomkärna." },
      { term: "Periodiska systemet", def: "Tabell över alla grundämnen, sorterade efter stigande atomnummer." },
      { term: "Grupp", def: "Lodrät kolumn i periodiska systemet. Ämnen i samma grupp har ofta liknande egenskaper." },
      { term: "Period", def: "Vågrät rad i periodiska systemet. Ämnen i samma period har lika många elektronskal." },
      { term: "Metaller", def: "Grundämnen som leder värme/el, glänser och kan smidas. Finns mest till vänster/mitten." }
    ];

    const grid = document.getElementById('game-grid');
    const movesEl = document.getElementById('moves');
    const pairsLeftEl = document.getElementById('pairs-left');
    const winEl = document.getElementById('win-message');
    const finalMovesEl = document.getElementById('final-moves');

    let flippedCards = [];
    let moves = 0;
    let pairsLeft = vocabulary.length;
    let lockBoard = false;

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createGameData(){
      const gameData = [];
      vocabulary.forEach((item, idx) => {
        gameData.push({ id: `t-${idx}`, content: item.term, matchId: idx, kind: 'term' });
        gameData.push({ id: `d-${idx}`, content: item.def,  matchId: idx, kind: 'def' });
      });
      return shuffle(gameData);
    }

    function createCard(data){
      const outer = document.createElement('div');
      outer.className = 'perspective card-wrap';

      // Framsida kan visa "?" (som tidigare), baksida visar innehåll
      outer.innerHTML = `
        <div class="flip-card-inner h-full w-full" data-id="${data.id}" data-match-id="${data.matchId}">
          <div class="flip-card-front">?</div>
          <div class="flip-card-back px-2 py-1 text-center font-semibold">
            ${data.content}
          </div>
        </div>
      `;

      const inner = outer.querySelector('.flip-card-inner');
      inner.addEventListener('click', () => flipCard(inner, outer));

      return outer;
    }

    function flipCard(inner, outer){
      if (lockBoard) return;
      if (outer.classList.contains('matched')) return;
      if (inner.classList.contains('flipped')) return;
      if (flippedCards.includes(inner)) return;

      inner.classList.add('flipped');
      flippedCards.push(inner);

      if (flippedCards.length === 2) checkMatch();
    }

    function checkMatch(){
      lockBoard = true;
      moves++;
      movesEl.textContent = moves;

      const [c1, c2] = flippedCards;
      const m1 = c1.getAttribute('data-match-id');
      const m2 = c2.getAttribute('data-match-id');

      const wrap1 = c1.parentElement;
      const wrap2 = c2.parentElement;

      if (m1 === m2){
        setTimeout(() => {
          wrap1.classList.add('matched');
          wrap2.classList.add('matched');

          pairsLeft--;
          pairsLeftEl.textContent = pairsLeft;

          flippedCards = [];
          lockBoard = false;

          if (pairsLeft === 0) showWin();
        }, 650);
      } else {
        setTimeout(() => {
          c1.classList.remove('flipped');
          c2.classList.remove('flipped');
          flippedCards = [];
          lockBoard = false;
        }, 950);
      }
    }

    function showWin(){
      finalMovesEl.textContent = moves;
      winEl.classList.add('open');
    }

    function hideWin(){
      winEl.classList.remove('open');
    }

    function resetGame(){
      hideWin();
      grid.innerHTML = '';

      moves = 0;
      movesEl.textContent = moves;

      pairsLeft = vocabulary.length;
      pairsLeftEl.textContent = pairsLeft;

      flippedCards = [];
      lockBoard = false;

      const data = createGameData();
      data.forEach(item => grid.appendChild(createCard(item)));
    }

    // Knappar
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    document.getElementById('playAgainBtn').addEventListener('click', resetGame);

    // Start
    window.addEventListener('load', resetGame);
  </script>
</body>
</html>
