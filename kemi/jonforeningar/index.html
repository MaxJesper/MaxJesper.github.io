<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonföreningar – Kemi</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-intro {
      margin-bottom: 1.5rem;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .resource-box {
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .resource-box h2 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.35rem;
    }

    .resource-box p {
      margin-top: 0;
      color: #444;
    }

    .resource-box ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .resource-box li {
      margin-bottom: 0.7rem;
    }

    .resource-box a {
      display: inline-block;
      text-decoration: none;
      font-weight: 600;
    }

    main {
      font-size: 1.2em;
    }

  </style>
</head>

<body>

<header class="kemi-header">
  <h1>Jonföreningar</h1>
  <p>Fäladsgården</p>
</header>

<button class="hamburger" onclick="toggleMenu()">☰</button>

<nav id="side-menu"></nav>

<main>
    <section class="page-intro">
      <p>Här hittar du material om joner, jonbindningar, salter, kristallstrukturer och jonföreningars egenskaper.</p>
    </section>

    <section class="resource-grid">
      <article class="resource-box">
        <h2>För elever</h2>
        <p>Material för att träna inför prov och bygga förståelse.</p>
        <p style="color:#888; font-style:italic;">Material kommer snart.</p>
      </article>
    </section>

    <p style="margin-top: 1.5rem;">
      <a href="/kemi/index.html" class="subject-btn">← Tillbaka till Kemi</a>
    </p>
  </main>

<script src="/js/menu.js"></script>
</body>
</html>
