<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instuderingsfrågor – Hjärta, blod och lungor (Elev)</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/instudering.css" />
</head>
<body>
  <header class="biologi-header">
    <h1>Instuderingsfrågor</h1>
    <p>Hjärta, blod och lungor – elev</p>
  </header>
  <main>
    <div class="print-note">
      <div class="print-field">
        <span class="print-label">Namn:</span>
        <span class="print-line print-line-name"></span>
      </div>
      <div class="print-field">
        <span class="print-label">Klass:</span>
        <span class="print-line print-line-class"></span>
      </div>
    </div>
    <div id="study-container"></div>
  </main>
  <script src="/js/render-instudering.js"></script>
  <script>
    renderStudySet({
      jsonPath: "./data/instuderingsfragor.json",
      mountId: "study-container",
      mode: "print-student"
    });
    function autoPrintAndClose() {
      window.addEventListener("afterprint", () => { try { window.close(); } catch (e) {} });
      setTimeout(() => { try { window.close(); } catch (e) {} }, 2500);
      window.print();
    }
    window.addEventListener("load", () => setTimeout(autoPrintAndClose, 350));
  </script>
</body>
</html>
