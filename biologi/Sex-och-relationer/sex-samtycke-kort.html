<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Sex, samtycke och relationer – Kort</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  /* Tvinga webbläsaren att skriva ut bakgrundsfärger */
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}

body { font-family: Georgia, serif; background: #e8e8e8; }

/* ── Skärm-header ─────────────────────────────────── */
.screen-only {
  text-align: center;
  padding: 20px;
  background: white;
  border-bottom: 1px solid #ccc;
  margin-bottom: 16px;
}
.screen-only h1 { font-size: 22px; color: #333; margin-bottom: 6px; }
.screen-only p  { color: #666; font-size: 14px; margin-bottom: 10px; }
.print-btn {
  padding: 10px 28px; font-size: 15px;
  background: #555; color: white;
  border: none; border-radius: 8px; cursor: pointer;
}
.print-btn:hover { background: #333; }

/* ── Print-inställningar ─────────────────────────── */
@media print {
  @page {
    size: A4 landscape;
    margin: 5mm;
  }
  body { background: white; margin: 0; padding: 0; }
  .screen-only { display: none; }
  .page {
    page-break-after: always;
    box-shadow: none !important;
    margin: 0 !important;
    width: 287mm !important;
    height: 200mm !important;
  }
  .page:last-child { page-break-after: auto; }
}

/* ── Sida (A4 liggande) ──────────────────────────── */
.page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2mm;
  width: 287mm;
  height: 200mm;
  margin: 10mm auto 4mm;
  background: white;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
}

/* ── Kortenhet (ett kort = framsida + baksida) ──── */
.card-unit {
  display: flex;
  overflow: hidden;
  border: 0.4px solid #bbb;
}

/* ── FRAMSIDA ────────────────────────────────────── */
.front {
  width: 50%;
  display: flex;
  flex-direction: column;
  padding: 3.5mm 4mm 3.5mm 4mm;
  border-right: 0.8px dashed #aaa;
}
.front.p { background: #FFDCE8; }
.front.b { background: #DCF0FF; }

.f-label {
  font-size: 10pt;
  font-weight: bold;
  letter-spacing: 2px;
  text-align: center;
  padding-bottom: 1.5mm;
}
.front.p .f-label { color: #7B1030; }
.front.b .f-label { color: #0C3060; }

.f-sep {
  height: 0.8px;
  margin: 0 6mm 3mm;
  border: none;
}
.front.p .f-sep { background: #C03060; }
.front.b .f-sep { background: #1060A8; }

.f-text {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-style: italic;
  line-height: 1.45;
  font-size: 13.5pt;
}
.front.p .f-text { color: #480818; }
.front.b .f-text { color: #071840; }

.f-text.big   { font-size: 20pt; font-weight: bold; font-style: normal; }
.f-text.small { font-size: 9.5pt; font-style: italic; }

/* ── BAKSIDA ─────────────────────────────────────── */
.back {
  width: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 4mm 3mm;
}
.back.p { background: #D04870; }
.back.b { background: #1E78BC; }

/* Övre etikett + underrubrik */
.back-top { display: flex; flex-direction: column; align-items: center; gap: 2mm; }

.b-label {
  font-size: 12pt;
  font-weight: bold;
  letter-spacing: 2.5px;
  color: white;
  text-align: center;
}
.b-sub {
  font-size: 8pt;
  color: white;
  font-style: italic;
  text-align: center;
  opacity: .9;
}

/* Symbol i cirkel */
.b-symbol {
  width: 26mm;
  height: 26mm;
  border-radius: 50%;
  background: rgba(255,255,255,.22);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28pt;
  color: #FF1A1A;
  flex-shrink: 0;
}

/* Nedre etikett (roterad 180°) */
.back-bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
  transform: rotate(180deg);
}
</style>
</head>
<body>

<div class="screen-only">
  <h1>Sex, samtycke och relationer – Spelkort</h1>
  <p>Skriv ut liggande A4 · Klipp längs kanterna · Vik vid den streckade linjen · Klistra ihop</p>
  <p style="color:#b00; font-size:13px; margin-top:6px;">⚠️ Viktigt: Slå på <strong>Bakgrundsgrafik</strong> i utskriftsinställningarna för att få färgerna.</p>
  <button class="print-btn" onclick="window.print()">🖨️ Skriv ut</button>
  <a href="./larande-spel.html" style="display:inline-block; margin-left:10px; padding:10px 22px; font-size:15px; background:#e0e0e0; color:#333; border-radius:8px; text-decoration:none;">← Tillbaka</a>
</div>

<script>

  {c:'p', t:'Du läser mina känslor som vore jag en bok!\nDu och jag har en helt underbar\nkommunikation!'},

  {c:'b', t:'Världen bleknar bort\nnär du tittar på mig och ler!\nOm gud finns, är du det underbaraste,\nsom han har skapat!'},

// ── Generera sidor ───────────────────────────────────────────
function nl2br(str) {
  // Extra mellanrum efter fetstilsrubrik (<strong>...</strong>\n → rubrik + tomrad)
  return str
    .replace(/(<\/strong>)\n/g, '$1<br><br>')
    .replace(/\n/g, '<br>');
}

function makeCardHTML(card) {
  const isP   = card.c === 'p';
  const sym   = isP ? '♥' : '♦';
  const lbl   = isP ? 'TJEJKORT' : 'KILLKORT';
  const fc    = isP ? 'p' : 'b';
  const bc    = isP ? 'p' : 'b';

  const textClass = card.big ? 'f-text big' : card.small ? 'f-text small' : 'f-text';
  const textContent = `<span>${nl2br(card.t)}</span>`;

  return `
  <div class="card-unit">
    <div class="front ${fc}">
      <div class="f-label">${lbl}</div>
      <hr class="f-sep">
      <div class="${textClass}">${textContent}</div>
    </div>
    <div class="back ${bc}">
      <div class="back-top">
        <div class="b-label">${lbl}</div>
        <div class="b-sub">Sex, samtycke och relationer</div>
      </div>
      <div class="b-symbol">${sym}</div>
      <div class="back-bottom">
        <div class="b-label">${lbl}</div>
        <div class="b-sub">Sex, samtycke och relationer</div>
      </div>
    </div>
  </div>`;
}

// Bygg sidor (4 kort per sida)
const body = document.querySelector('body');
for (let i = 0; i < CARDS.length; i += 4) {
  const page = document.createElement('div');
  page.className = 'page';
  const batch = CARDS.slice(i, i + 4);
  page.innerHTML = batch.map(makeCardHTML).join('');
  body.appendChild(page);
}
</script>
</body>
</html>
