<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facit – Materia (Utskrift)</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/prov.css" />
</head>

<body>
  <header class="fysik-header">
    <h1>FACIT</h1>
    <p>Övningsprov – Materia (åk 7)</p>
  </header>

  <main>
    <div id="prov-container"></div>
  </main>

  <script src="/js/render-prov.js"></script>
  <script>
    renderProv({
      jsonPath: "/fysik/materia/data/ovningsprov.json",
      mountId: "prov-container",
      mode: "print-facit"
    });

    function autoPrintAndClose() {
      window.addEventListener("afterprint", () => {
        try { window.close(); } catch (e) {}
      });
      setTimeout(() => { try { window.close(); } catch (e) {} }, 2500);
      window.print();
    }

    window.addEventListener("load", () => setTimeout(autoPrintAndClose, 350));
  </script>
</body>
</html>
