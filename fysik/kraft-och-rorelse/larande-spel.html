<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lärande spel – Krafter och rörelse – Fysik</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0%, transparent 35%),
        radial-gradient(circle at top right, #e0f2fe 0%, transparent 30%),
        linear-gradient(180deg, #eef4ff 0%, #f8fbff 45%, #ffffff 100%);
      color:#1f2937;
    }

    .page{
      max-width:1100px;
      margin:0 auto;
      padding:20px;
    }

    .hero{
      background:linear-gradient(135deg, #e8f0ff, #ffffff);
      border:1px solid #d8e0ea;
      border-radius:18px;
      padding:20px;
      margin-bottom:24px;
      box-shadow:0 6px 18px rgba(0,0,0,0.05);
    }

    .hero h1{
      margin:0 0 8px;
      font-size:2rem;
    }

    .hero p{
      margin:0;
      color:#5b6472;
      line-height:1.5;
    }

    .back-link{
      display:inline-block;
      margin-bottom:18px;
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
    }

    .back-link:hover{
      text-decoration:underline;
    }

    .spel-symboler{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:24px;
      align-items:stretch;
      background:rgba(255,255,255,0.55);
      border:1px solid rgba(216,224,234,0.8);
      border-radius:22px;
      padding:24px;
      backdrop-filter:blur(2px);
    }
    
    .spel-symbol{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-decoration:none;
      color:#1f2937;
      background:linear-gradient(180deg,#f7fbff,#eaf3ff);
      border:1px solid #d7e3f0;
      border-radius:18px;
      padding:14px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      transition:transform 0.15s ease, box-shadow 0.15s ease;
      min-height:250px;
    }
    
    .spel-symbol:hover{
      transform:translateY(-4px);
      box-shadow:0 12px 24px rgba(0,0,0,0.12);
    }
    
    .spel-symbol img{
      width:100%;
      max-width:170px;
      height:170px;
      object-fit:cover;
      border-radius:18px;
      border:1px solid #d8e0ea;
      background:#fff;
      display:block;
    }
    
    .spel-symbol .pickup-bild{
      object-fit:contain;
      padding:8px;
    }
    
    .spel-symbol span{
      margin-top:10px;
      font-size:1rem;
      font-weight:700;
      text-align:center;
    }

    @media (max-width: 768px){
      .page{
        padding:16px;
      }

      .hero h1{
        font-size:1.7rem;
      }

      .spel-symboler{
        grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
        gap:18px;
        padding:18px;
      }

      .spel-symbol img{
        max-width:150px;
      }

      .spelikon img{
        max-width:180px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="/fysik/kraft-och-rorelse/">← Tillbaka till Krafter och rörelse</a>

    <section class="hero">
      <h1>Lärande spel</h1>
      <p>Välj ett spel för att träna begrepp och fysik på ett roligt sätt.</p>
    </section>

    <section class="spel-symboler">
      <a class="spel-symbol" href="/fysik/kraft-och-rorelse/begreppskort.html">
        <img src="/images/fysik/kraft-och-rorelse/begrepp.png" alt="Begrepp" />
        <span>Begrepp</span>
      </a>
    
      <a class="spel-symbol" href="/fysik/kraft-och-rorelse/gungbrada.html">
        <img src="/images/fysik/kraft-och-rorelse/gungbrada.png" alt="Hävstångslagen" />
        <span>Hävstångslagen</span>
      </a>
    
      <a class="spel-symbol" href="/fysik/kraft-och-rorelse/pickup-simulering.html">
        <img class="pickup-bild" src="/images/fysik/kraft-och-rorelse/pickup.png" alt="Accelerationslagen" />
        <span>Accelerationslagen</span>
      </a>
    
      <a class="spel-symbol" href="/fysik/kraft-och-rorelse/korsord.html">
        <img src="/images/fysik/kraft-och-rorelse/Korsord.PNG" alt="Korsord" />
        <span>Korsord</span>
      </a>
    </section>
  </div>
</body>
</html>
