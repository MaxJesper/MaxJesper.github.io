<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Begreppshierarki från cell till baspar">
  <defs>
    <marker id="zoom" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#15803d"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="300" fill="#f0fdf4" rx="14"/>
  <text x="410" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">Från cell till baspar – allt sitter inuti vartannat</text>

  <!-- Cell -->
  <g>
    <circle cx="80" cy="150" r="46" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="80" cy="150" r="20" fill="#16a34a" opacity="0.35"/>
    <text x="80" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Cell</text>
    <text x="80" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">med cellkärna</text>
  </g>
  <line x1="130" y1="150" x2="178" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- Kromosom -->
  <g>
    <path d="M210 118 C 236 138, 236 162, 210 182 M250 118 C 224 138, 224 162, 250 182" stroke="#16a34a" stroke-width="11" fill="none" stroke-linecap="round"/>
    <text x="230" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Kromosom</text>
    <text x="230" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">hoppackad DNA</text>
  </g>
  <line x1="278" y1="150" x2="326" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- DNA double helix (3D-tub-stil) -->
  <g stroke-linecap="round">
    <!-- rungs (baspar) bakom -->
    <g stroke="#22c55e" stroke-width="3.2" stroke-linecap="round">
      <line x1="388.5" y1="120.7" x2="371.5" y2="120.7"/>
      <line x1="374.2" y1="125.6" x2="385.8" y2="125.6"/>
      <line x1="364.0" y1="130.4" x2="396.0" y2="130.4"/>
      <line x1="365.3" y1="135.3" x2="394.7" y2="135.3"/>
      <line x1="377.0" y1="140.2" x2="383.0" y2="140.2"/>
      <line x1="390.9" y1="145.1" x2="369.1" y2="145.1"/>
      <line x1="397.0" y1="150.0" x2="363.0" y2="150.0"/>
      <line x1="390.9" y1="154.9" x2="369.1" y2="154.9"/>
      <line x1="377.0" y1="159.8" x2="383.0" y2="159.8"/>
      <line x1="365.3" y1="164.7" x2="394.7" y2="164.7"/>
      <line x1="364.0" y1="169.6" x2="396.0" y2="169.6"/>
      <line x1="374.2" y1="174.4" x2="385.8" y2="174.4"/>
      <line x1="388.5" y1="179.3" x2="371.5" y2="179.3"/>
    </g>
    <!-- bakre sträng (öppen ände, möter inte den främre) -->
    <polyline fill="none" stroke="#166534" stroke-width="6.8" points="363.2,115.6 364.3,117.0 366.3,118.4 369.2,119.8 372.7,121.1 376.7,122.5 380.8,123.9 384.9,125.2 388.7,126.6 392.0,128.0 394.6,129.4 396.3,130.8 397.0,132.1 396.7,133.5 395.4,134.9 393.1,136.2 390.1,137.6 386.5,139.0 382.5,140.4 378.3,141.8 374.3,143.1 370.6,144.5 367.4,145.9 365.0,147.2 363.5,148.6 363.0,150.0 363.5,151.4 365.0,152.8 367.4,154.1 370.6,155.5 374.3,156.9 378.3,158.2 382.5,159.6 386.5,161.0 390.1,162.4 393.1,163.8 395.4,165.1 396.7,166.5 397.0,167.9 396.3,169.2 394.6,170.6 392.0,172.0 388.7,173.4 384.9,174.8 380.8,176.1 376.7,177.5 372.7,178.9 369.2,180.2 366.3,181.6 364.3,183.0 363.2,184.4"/>
    <polyline fill="none" stroke="#4ade80" stroke-width="2.2" points="363.2,115.6 364.3,117.0 366.3,118.4 369.2,119.8 372.7,121.1 376.7,122.5 380.8,123.9 384.9,125.2 388.7,126.6 392.0,128.0 394.6,129.4 396.3,130.8 397.0,132.1 396.7,133.5 395.4,134.9 393.1,136.2 390.1,137.6 386.5,139.0 382.5,140.4 378.3,141.8 374.3,143.1 370.6,144.5 367.4,145.9 365.0,147.2 363.5,148.6 363.0,150.0 363.5,151.4 365.0,152.8 367.4,154.1 370.6,155.5 374.3,156.9 378.3,158.2 382.5,159.6 386.5,161.0 390.1,162.4 393.1,163.8 395.4,165.1 396.7,166.5 397.0,167.9 396.3,169.2 394.6,170.6 392.0,172.0 388.7,173.4 384.9,174.8 380.8,176.1 376.7,177.5 372.7,178.9 369.2,180.2 366.3,181.6 364.3,183.0 363.2,184.4"/>
    <!-- främre sträng (öppen ände, möter inte den bakre) -->
    <polyline fill="none" stroke="#15803d" stroke-width="7" points="396.8,115.6 395.7,117.0 393.7,118.4 390.8,119.8 387.3,121.1 383.3,122.5 379.2,123.9 375.1,125.2 371.3,126.6 368.0,128.0 365.4,129.4 363.7,130.8 363.0,132.1 363.3,133.5 364.6,134.9 366.9,136.2 369.9,137.6 373.5,139.0 377.5,140.4 381.7,141.8 385.7,143.1 389.4,144.5 392.6,145.9 395.0,147.2 396.5,148.6 397.0,150.0 396.5,151.4 395.0,152.8 392.6,154.1 389.4,155.5 385.7,156.9 381.7,158.2 377.5,159.6 373.5,161.0 369.9,162.4 366.9,163.8 364.6,165.1 363.3,166.5 363.0,167.9 363.7,169.2 365.4,170.6 368.0,172.0 371.3,173.4 375.1,174.8 379.2,176.1 383.3,177.5 387.3,178.9 390.8,180.2 393.7,181.6 395.7,183.0 396.8,184.4"/>
    <polyline fill="none" stroke="#86efac" stroke-width="2.4" points="396.8,115.6 395.7,117.0 393.7,118.4 390.8,119.8 387.3,121.1 383.3,122.5 379.2,123.9 375.1,125.2 371.3,126.6 368.0,128.0 365.4,129.4 363.7,130.8 363.0,132.1 363.3,133.5 364.6,134.9 366.9,136.2 369.9,137.6 373.5,139.0 377.5,140.4 381.7,141.8 385.7,143.1 389.4,144.5 392.6,145.9 395.0,147.2 396.5,148.6 397.0,150.0 396.5,151.4 395.0,152.8 392.6,154.1 389.4,155.5 385.7,156.9 381.7,158.2 377.5,159.6 373.5,161.0 369.9,162.4 366.9,163.8 364.6,165.1 363.3,166.5 363.0,167.9 363.7,169.2 365.4,170.6 368.0,172.0 371.3,173.4 375.1,174.8 379.2,176.1 383.3,177.5 387.3,178.9 390.8,180.2 393.7,181.6 395.7,183.0 396.8,184.4"/>
    <text x="380" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">DNA</text>
    <text x="380" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">dubbelspiral</text>
  </g>
  <line x1="430" y1="150" x2="478" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- Gen -->
  <g>
    <rect x="508" y="141" width="96" height="18" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <rect x="536" y="141" width="34" height="18" rx="3" fill="#15803d"/>
    <text x="556" y="132" text-anchor="middle" font-size="11.5" fill="#15803d">en gen</text>
    <text x="556" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Gen</text>
    <text x="556" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">recept på ett protein</text>
  </g>
  <line x1="612" y1="150" x2="660" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- Baspar -->
  <g>
    <line x1="700" y1="112" x2="700" y2="188" stroke="#15803d" stroke-width="3"/>
    <line x1="772" y1="112" x2="772" y2="188" stroke="#15803d" stroke-width="3"/>
    <g font-size="12" font-weight="700" text-anchor="middle">
      <rect x="700" y="120" width="36" height="15" fill="#16a34a"/><text x="718" y="132" fill="#fff">A</text>
      <rect x="736" y="120" width="36" height="15" fill="#86efac"/><text x="754" y="132" fill="#14532d">T</text>
      <rect x="700" y="142" width="36" height="15" fill="#86efac"/><text x="718" y="154" fill="#14532d">G</text>
      <rect x="736" y="142" width="36" height="15" fill="#16a34a"/><text x="754" y="154" fill="#fff">C</text>
      <rect x="700" y="164" width="36" height="15" fill="#86efac"/><text x="718" y="176" fill="#14532d">T</text>
      <rect x="736" y="164" width="36" height="15" fill="#16a34a"/><text x="754" y="176" fill="#fff">A</text>
    </g>
    <text x="736" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Baspar</text>
    <text x="736" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">A–T och G–C</text>
  </g>

  <text x="410" y="280" text-anchor="middle" font-size="12.5" fill="#3f6b4e">Cellkärnan rymmer kromosomerna · varje kromosom är en hårt hoppackad DNA-molekyl · ett avsnitt av DNA-stegen är en <tspan font-weight="700" fill="#15803d">gen</tspan> · och varje stegpinne är ett baspar (A–T, G–C).</text>
</svg>
