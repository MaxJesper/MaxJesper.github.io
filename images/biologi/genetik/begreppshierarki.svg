<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Begreppshierarki från cell till baspar">
  <defs>
    <marker id="zoom" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#15803d"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="300" fill="#f0fdf4" rx="14"/>
  <text x="410" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">Från cell till baspar – allt sitter inuti vartannat</text>

  <!-- Cell -->
  <g>
    <circle cx="80" cy="150" r="46" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="80" cy="150" r="20" fill="#16a34a" opacity="0.35"/>
    <text x="80" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Cell</text>
    <text x="80" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">med cellkärna</text>
  </g>
  <line x1="130" y1="150" x2="178" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- Kromosom -->
  <g>
    <path d="M210 118 C 236 138, 236 162, 210 182 M250 118 C 224 138, 224 162, 250 182" stroke="#16a34a" stroke-width="11" fill="none" stroke-linecap="round"/>
    <text x="230" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Kromosom</text>
    <text x="230" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">hoppackad DNA</text>
  </g>
  <line x1="278" y1="150" x2="326" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- DNA helix -->
  <g>
    <path d="M360 112 C 400 138, 360 162, 400 188 M400 112 C 360 138, 400 162, 360 188" stroke="#15803d" stroke-width="3.5" fill="none"/>
    <line x1="372" y1="124" x2="388" y2="124" stroke="#22c55e" stroke-width="3"/>
    <line x1="368" y1="150" x2="392" y2="150" stroke="#22c55e" stroke-width="3"/>
    <line x1="372" y1="176" x2="388" y2="176" stroke="#22c55e" stroke-width="3"/>
    <text x="380" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">DNA</text>
    <text x="380" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">dubbelspiral</text>
  </g>
  <line x1="430" y1="150" x2="478" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- Gen -->
  <g>
    <rect x="508" y="132" width="96" height="36" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <rect x="536" y="132" width="34" height="36" rx="4" fill="#15803d"/>
    <text x="556" y="120" text-anchor="middle" font-size="11.5" fill="#15803d">en gen</text>
    <text x="556" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Gen</text>
    <text x="556" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">recept på ett protein</text>
  </g>
  <line x1="612" y1="150" x2="660" y2="150" stroke="#15803d" stroke-width="2.5" marker-end="url(#zoom)"/>

  <!-- Baspar -->
  <g>
    <line x1="700" y1="112" x2="700" y2="188" stroke="#15803d" stroke-width="3"/>
    <line x1="772" y1="112" x2="772" y2="188" stroke="#15803d" stroke-width="3"/>
    <g font-size="12" font-weight="700" text-anchor="middle">
      <rect x="700" y="120" width="36" height="15" fill="#16a34a"/><text x="718" y="132" fill="#fff">A</text>
      <rect x="736" y="120" width="36" height="15" fill="#86efac"/><text x="754" y="132" fill="#14532d">T</text>
      <rect x="700" y="142" width="36" height="15" fill="#86efac"/><text x="718" y="154" fill="#14532d">G</text>
      <rect x="736" y="142" width="36" height="15" fill="#16a34a"/><text x="754" y="154" fill="#fff">C</text>
      <rect x="700" y="164" width="36" height="15" fill="#86efac"/><text x="718" y="176" fill="#14532d">T</text>
      <rect x="736" y="164" width="36" height="15" fill="#16a34a"/><text x="754" y="176" fill="#fff">A</text>
    </g>
    <text x="736" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Baspar</text>
    <text x="736" y="238" text-anchor="middle" font-size="11.5" fill="#3f6b4e">A–T och G–C</text>
  </g>

  <text x="410" y="284" text-anchor="middle" font-size="12.5" fill="#3f6b4e" font-style="italic">Varje steg är en inzoomning på det föregående: cellen rymmer kärnan, kärnan kromosomerna, kromosomen DNA:t, DNA:t generna.</text>
</svg>
