<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <!-- Pil för anodflöde -->
    <marker id="arrowLeft" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#c0a0a0"/>
    </marker>
    <!-- Pil för jonflöde -->
    <marker id="arrowCurve" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#374151"/>
    </marker>
    <!-- Pil för elektroner i ledare -->
    <marker id="arrowElec" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#374151"/>
    </marker>
    <!-- Gradient Zn-elektrod -->
    <linearGradient id="gradZn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <!-- Gradient Cu-elektrod -->
    <linearGradient id="gradCu" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c2793c"/>
      <stop offset="50%" stop-color="#f0a050"/>
      <stop offset="100%" stop-color="#a0580a"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════
       BAKGRUND
  ══════════════════════════════════════ -->
  <rect width="600" height="420" fill="#f0f4ff" rx="14"/>

  <!-- ══════════════════════════════════════
       VÄTSKEKAR (under vågtoppen)
       Vänster = ZnSO₄ (ljusgrå), Höger = CuSO₄ (blå)
  ══════════════════════════════════════ -->
  <!-- Vänster lösning (ZnSO₄) -->
  <rect x="30" y="180" width="263" height="200" fill="#dde3ec"/>
  <!-- Höger lösning (CuSO₄) -->
  <rect x="307" y="180" width="263" height="200" fill="#bdd5f0"/>

  <!-- Botten och sidor av karet -->
  <rect x="30" y="375" width="540" height="5" rx="2" fill="#6b7280"/>
  <rect x="30" y="180" width="5" height="200" fill="#6b7280"/>
  <rect x="565" y="180" width="5" height="200" fill="#6b7280"/>

  <!-- Vågig vätskeyta – vänster -->
  <path d="M30,180
           Q50,168 70,180 Q90,192 110,180 Q130,168 150,180
           Q170,192 190,180 Q210,168 230,180 Q250,192 270,180
           L293,180 L293,180" fill="#dde3ec" stroke="#aab5c8" stroke-width="1.2"/>

  <!-- Vågig vätskeyta – höger -->
  <path d="M307,180
           Q327,168 347,180 Q367,192 387,180 Q407,168 427,180
           Q447,192 467,180 Q487,168 507,180 Q527,192 547,180
           L570,180 L570,180" fill="#bdd5f0" stroke="#7aaed4" stroke-width="1.2"/>

  <!-- Karets översta kant (linje) -->
  <line x1="30" y1="180" x2="293" y2="180" stroke="#aab5c8" stroke-width="1.5"/>
  <line x1="307" y1="180" x2="570" y2="180" stroke="#7aaed4" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════
       PORÖS SKIVA (mittdelare)
  ══════════════════════════════════════ -->
  <rect x="287" y="165" width="26" height="215" rx="5" fill="#f4c0b8" stroke="#d08070" stroke-width="1.5"/>
  <!-- Porösa hål i skivan -->
  <circle cx="300" cy="215" r="3.5" fill="#d08070" opacity="0.5"/>
  <circle cx="300" cy="235" r="3.5" fill="#d08070" opacity="0.5"/>
  <circle cx="300" cy="255" r="3.5" fill="#d08070" opacity="0.5"/>
  <circle cx="300" cy="275" r="3.5" fill="#d08070" opacity="0.5"/>
  <circle cx="300" cy="295" r="3.5" fill="#d08070" opacity="0.5"/>

  <!-- ══════════════════════════════════════
       ANODFLÖDE-PIL
  ══════════════════════════════════════ -->
  <path d="M380,300 L320,300" stroke="#c0a0a0" stroke-width="18" stroke-linecap="round" marker-end="url(#arrowLeft)" opacity="0.55"/>
  <text x="410" y="305" font-size="12" fill="#7c5050" font-weight="600">Anodflöde</text>

  <!-- ══════════════════════════════════════
       ZN-ELEKTROD (vänster)
  ══════════════════════════════════════ -->
  <rect x="132" y="190" width="38" height="155" rx="5" fill="url(#gradZn)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="151" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Zn</text>
  <text x="165" y="290" text-anchor="start" font-size="9.5" fill="#334155">(s)</text>
  <!-- Anslutningspunkt -->
  <circle cx="151" cy="190" r="5" fill="#374151"/>

  <!-- ══════════════════════════════════════
       CU-ELEKTROD (höger)
  ══════════════════════════════════════ -->
  <rect x="430" y="190" width="38" height="155" rx="5" fill="url(#gradCu)" stroke="#a16207" stroke-width="1.5"/>
  <text x="449" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Cu</text>
  <text x="463" y="290" text-anchor="start" font-size="9.5" fill="#7c2d12">(s)</text>
  <!-- Anslutningspunkt -->
  <circle cx="449" cy="190" r="5" fill="#374151"/>

  <!-- ══════════════════════════════════════
       YTTRE LEDARE + LAMPA
  ══════════════════════════════════════ -->
  <!-- Vänster ledartråd: elektrod → upp → lampa -->
  <polyline points="151,185 151,100 270,100" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Höger ledartråd: lampa → upp → elektrod -->
  <polyline points="330,100 449,100 449,185" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minus-tecken vid vänster anslutning -->
  <text x="155" y="120" font-size="22" font-weight="900" fill="#374151">−</text>
  <!-- Plus-tecken vid höger anslutning -->
  <text x="428" y="120" font-size="20" font-weight="900" fill="#374151">+</text>

  <!-- Glödlampa (mitten av tråden) -->
  <!-- Sockel -->
  <rect x="285" y="95" width="30" height="14" rx="3" fill="#8B5E3C"/>
  <!-- Glödkupa -->
  <ellipse cx="300" cy="82" rx="22" ry="20" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>
  <!-- Glödtråd -->
  <path d="M291,82 Q295,74 300,82 Q305,90 309,82" fill="none" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Ljusstrålar -->
  <line x1="300" y1="59" x2="300" y2="52" stroke="#FDE68A" stroke-width="2" stroke-linecap="round"/>
  <line x1="316" y1="64" x2="321" y2="58" stroke="#FDE68A" stroke-width="2" stroke-linecap="round"/>
  <line x1="284" y1="64" x2="279" y2="58" stroke="#FDE68A" stroke-width="2" stroke-linecap="round"/>
  <line x1="322" y1="76" x2="329" y2="73" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="278" y1="76" x2="271" y2="73" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════
       ELEKTRONBUBBLOR (vänster: lämnar Zn)
  ══════════════════════════════════════ -->
  <circle cx="108" cy="148" r="16" fill="#f5f0d8" stroke="#b8a848" stroke-width="1.5"/>
  <text x="108" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">e⁻</text>
  <circle cx="85" cy="128" r="16" fill="#f5f0d8" stroke="#b8a848" stroke-width="1.5"/>
  <text x="85" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">e⁻</text>
  <!-- Pil från elektron-bubbla mot tråden -->
  <path d="M120,138 L148,113" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowCurve)"/>

  <!-- ══════════════════════════════════════
       ELEKTRONBUBBLOR (höger: anländer Cu)
  ══════════════════════════════════════ -->
  <circle cx="490" cy="148" r="16" fill="#f5f0d8" stroke="#b8a848" stroke-width="1.5"/>
  <text x="490" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">e⁻</text>
  <circle cx="515" cy="128" r="16" fill="#f5f0d8" stroke="#b8a848" stroke-width="1.5"/>
  <text x="515" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">e⁻</text>
  <!-- Pil mot elektroden -->
  <path d="M476,138 L452,113" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowCurve)"/>

  <!-- ══════════════════════════════════════
       JONBUBBLOR I LÖSNING
  ══════════════════════════════════════ -->
  <!-- Zn²⁺ bildas (vänster) -->
  <circle cx="215" cy="295" r="22" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="215" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Zn</text>
  <text x="215" y="305" text-anchor="middle" font-size="10" fill="#334155">⁺²(aq)</text>
  <!-- Böjd pil från Zn-platta mot jonbubbla -->
  <path d="M175,310 Q190,340 210,315" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowCurve)"/>

  <!-- Cu²⁺ förbrukas (höger) -->
  <circle cx="395" cy="295" r="22" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="395" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Cu</text>
  <text x="395" y="305" text-anchor="middle" font-size="10" fill="#1e40af">⁺²(aq)</text>
  <!-- Böjd pil från jonbubbla mot Cu-platta -->
  <path d="M418,275 Q440,260 447,280" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowCurve)"/>

  <!-- ══════════════════════════════════════
       ETIKETTER
  ══════════════════════════════════════ -->
  <!-- Zinkanod -->
  <text x="151" y="42" text-anchor="middle" font-size="17" font-weight="800" fill="#1e293b">Zinkanod</text>
  <!-- Kopparkatod -->
  <text x="449" y="42" text-anchor="middle" font-size="17" font-weight="800" fill="#1e293b">Kopparkatod</text>

  <!-- Porös skiva-etikett -->
  <text x="300" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#7c5050">Porös</text>
  <text x="300" y="167" text-anchor="middle" font-size="11" font-weight="600" fill="#7c5050">skiva</text>

  <!-- ZnSO₄ (aq) -->
  <text x="70" y="390" font-size="12" font-weight="600" fill="#475569">ZnSO₄ (aq)</text>
  <!-- CuSO₄ (aq) -->
  <text x="450" y="390" font-size="12" font-weight="600" fill="#1d4ed8">CuSO₄ (aq)</text>

</svg>
