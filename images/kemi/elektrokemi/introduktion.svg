<svg viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">

  <!-- Bakgrund -->
  <rect width="560" height="400" fill="#f8faff" rx="12"/>

  <!-- Rubrik -->
  <text x="280" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Galvaniskt element – kemisk energi blir elektrisk ström</text>

  <!-- ══════════════════════════════════
       ELEKTROLYTKAR
  ══════════════════════════════════ -->
  <rect x="100" y="160" width="360" height="160" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="280" y="258" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Elektrolyt (t.ex. ZnSO₄-lösning)</text>
  <text x="280" y="276" text-anchor="middle" font-size="11" fill="#3b82f6">Zn²⁺ och SO₄²⁻ joner rör sig fritt</text>

  <!-- ══════════════════════════════════
       ZINKPLATTA (minuspol)
  ══════════════════════════════════ -->
  <rect x="130" y="100" width="50" height="200" rx="6" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <text x="155" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Zn</text>
  <!-- Minus-symbol -->
  <circle cx="155" cy="75" r="14" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="155" y="80" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">−</text>
  <text x="155" y="58" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="700">MINUSPOL</text>

  <!-- Zn löses: bubblor -->
  <circle cx="143" cy="155" r="4" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.6"/>
  <circle cx="158" cy="145" r="3" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.6"/>
  <circle cx="167" cy="158" r="5" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.6"/>
  <text x="155" y="195" text-anchor="middle" font-size="9.5" fill="#374151">Zn → Zn²⁺ + 2e⁻</text>
  <text x="155" y="208" text-anchor="middle" font-size="9" fill="#374151">(löses upp)</text>

  <!-- ══════════════════════════════════
       KOPPARPLATTA (pluspol)
  ══════════════════════════════════ -->
  <rect x="380" y="100" width="50" height="200" rx="6" fill="#b45309" stroke="#92400e" stroke-width="1.5"/>
  <text x="405" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Cu</text>
  <!-- Plus-symbol -->
  <circle cx="405" cy="75" r="14" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="405" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">+</text>
  <text x="405" y="58" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">PLUSPOL</text>

  <!-- Koppar fälls ut -->
  <text x="405" y="195" text-anchor="middle" font-size="9.5" fill="#92400e">Cu²⁺ + 2e⁻ → Cu</text>
  <text x="405" y="208" text-anchor="middle" font-size="9" fill="#92400e">(fälls ut)</text>

  <!-- ══════════════════════════════════
       LEDARE (trådarna ovan)
  ══════════════════════════════════ -->
  <path d="M155 100 L155 55 L280 55 L405 55 L405 100" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>

  <!-- Glödlampa i mitten av ledaren -->
  <circle cx="280" cy="55" r="14" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="280" y="60" text-anchor="middle" font-size="14">💡</text>

  <!-- Elektronpil 1: från Zn mot lampa -->
  <path d="M185 52 L240 52" fill="none" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Elektronpil 2: från lampa mot Cu -->
  <path d="M320 52 L375 52" fill="none" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Text "elektroner" -->
  <text x="213" y="44" text-anchor="middle" font-size="10" fill="#1d4ed8">e⁻ →</text>
  <text x="348" y="44" text-anchor="middle" font-size="10" fill="#1d4ed8">e⁻ →</text>

  <!-- ══════════════════════════════════
       JONRÖRELSER I ELEKTROLYTEN
  ══════════════════════════════════ -->
  <!-- Zn²⁺ rör sig höger (mot Cu) -->
  <path d="M200 230 L240 230" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowDkBlue)" stroke-dasharray="4,3"/>
  <text x="220" y="225" text-anchor="middle" font-size="9.5" fill="#1d4ed8">Zn²⁺ →</text>
  <!-- SO₄²⁻ rör sig vänster (mot Zn) -->
  <path d="M360 295 L320 295" fill="none" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrowPurple)" stroke-dasharray="4,3"/>
  <text x="340" y="290" text-anchor="middle" font-size="9.5" fill="#7c3aed">← SO₄²⁻</text>

  <!-- ══════════════════════════════════
       PILSPETSAR (markers)
  ══════════════════════════════════ -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowDkBlue" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="7" markerHeight="7" refX="2" refY="2.5" orient="auto">
      <path d="M7,0 L7,5 L0,2.5 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════
       FÖRKLARINGSRUTA NERE
  ══════════════════════════════════ -->
  <rect x="80" y="336" width="400" height="50" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="280" y="354" text-anchor="middle" font-size="10.5" fill="#1e3a8a" font-weight="600">Den oädlare metallen (Zn) avger elektroner → elektroner flödar i ledaren → lyser lampan.</text>
  <text x="280" y="370" text-anchor="middle" font-size="10.5" fill="#374151">Den ädlare metallen (Cu) tar emot elektroner och kopparjoner fälls ut på plattan.</text>
  <text x="280" y="386" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">Ju längre isär i spänningsserien, desto högre spänning.</text>

</svg>
